services:
  api:
    build: .
    ports:
      - "4567:4567"
    environment:
      - DATABASE_URL=postgres://metrics:metrics_password@db/metrics_db
      - RACK_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app:cached
    command: bundle exec puma -t 5:5 -p 4567
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4567/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=metrics
      - POSTGRES_PASSWORD=metrics_password
      - POSTGRES_DB=metrics_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metrics -d metrics_db"]
      interval: 5s
      timeout: 5s
      retries: 5
